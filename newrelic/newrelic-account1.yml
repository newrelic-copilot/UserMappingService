common: &default_settings
  license_key: '<%= ENV["NEW_RELIC_LICENSE_KEY_1"] %>'
  app_name: UserMappingService-Account1
  log_level: info
  audit_mode: false

  labels:
    repository: https://github.com/newrelic-copilot/UserMappingService

  distributed_tracing:
    enabled: true

  application_logging:
    enabled: true
    forwarding:
      enabled: true
      max_samples_stored: 10000
    metrics:
      enabled: true
    local_decorating:
      enabled: false

development:
  <<: *default_settings
  app_name: UserMappingService-Account1 (Development)

staging:
  <<: *default_settings
  app_name: UserMappingService-Account1 (Staging)

production:
  <<: *default_settings
